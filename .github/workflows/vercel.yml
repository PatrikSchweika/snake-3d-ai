name: CI and Vercel Deploy

on:
  pull_request:
  push:
    branches:
      - '**'
  workflow_dispatch:

concurrency:
  group: vercel-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: '24'
  VITE_THEME_MUSIC_URL: ${{ vars.VITE_THEME_MUSIC_URL || secrets.VITE_THEME_MUSIC_URL }}

jobs:
  checks:
    name: Lint and Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run build
        run: npm run build

      - name: Upload dist artifact
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: dist
          if-no-files-found: error

  deploy-preview:
    name: Deploy Preview
    runs-on: ubuntu-latest
    needs: checks
    if: github.event_name == 'push' && github.ref != 'refs/heads/main'
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: dist

      - name: Prepare Vercel static output
        run: |
          mkdir -p .vercel/output/static
          cp -R dist/. .vercel/output/static/
          printf '{\n  "version": 3\n}\n' > .vercel/output/config.json

      - name: Deploy preview to Vercel
        run: npx vercel@latest deploy --prebuilt --archive=tgz --token=${{ secrets.VERCEL_TOKEN }}

  deploy-production:
    name: Deploy Production
    runs-on: ubuntu-latest
    needs: checks
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: dist

      - name: Prepare Vercel static output
        run: |
          mkdir -p .vercel/output/static
          cp -R dist/. .vercel/output/static/
          printf '{\n  "version": 3\n}\n' > .vercel/output/config.json

      - name: Deploy production to Vercel
        run: npx vercel@latest deploy --prebuilt --prod --archive=tgz --token=${{ secrets.VERCEL_TOKEN }}
